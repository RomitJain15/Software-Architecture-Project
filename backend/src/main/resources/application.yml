spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/resourcesharing
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus