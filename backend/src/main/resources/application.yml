spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resourcesharing}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      pool-name: ${SPRING_DATASOURCE_HIKARI_POOL_NAME:RSPHikariPool}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always

server:
  port: ${PORT:8080}

app:
  auth:
    session-cache-ttl-seconds: ${APP_AUTH_SESSION_CACHE_TTL_SECONDS:15}
  frontend:
    allowed-origins: ${FRONTEND_URLS:http://localhost:3000,http://localhost:5173}
  admin:
    seed:
      enabled: true
      reset-users: false
      email: admin@example.com
      password: admin123
      name: Admin
